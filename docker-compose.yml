services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: schoolhub-db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    image: node:20-alpine
    container_name: schoolhub-app
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./dist:/app/dist:ro
    command: sh -c "npm install && npm start"

volumes:
  pgdata: