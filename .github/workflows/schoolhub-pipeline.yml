name: SchoolHub CI/CD Simulation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    name: CI Checks
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        run: |
          if [ -f backend/package.json ]; then
            npm install --prefix backend
          else
            echo "backend/package.json not found, skipping backend install"
          fi

      - name: Validate backend syntax
        run: |
          if [ -f backend/server.js ]; then
            node --check backend/server.js
          else
            echo "backend/server.js not found, skipping backend syntax check"
          fi

  deploy_simulation:
    name: Deploy Simulation
    runs-on: self-hosted
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Simulate deploy to server
        run: |
          echo "Deploying SchoolHub to simulated server..."
          echo "Build passed, deployment step completed."
