name: SchoolHub CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    name: CI Checks
    runs-on: [self-hosted, macOS, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        run: |
          if [ -f backend/package.json ]; then
            npm install --prefix backend
          else
            echo "backend/package.json not found, skipping backend install"
          fi

      - name: Validate backend syntax
        run: |
          if [ -f backend/server.js ]; then
            node --check backend/server.js
          else
            echo "backend/server.js not found, skipping backend syntax check"
          fi

  deploy:
    name: Docker Deploy
    runs-on: [self-hosted, macOS, X64]
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy containers
        run: |
          cd /Users/rihardsindars/schoolhub
          git pull origin main
          npm install
          npm run build
          docker compose down || true
          docker compose up -d --build
          docker ps