name: SchoolHub CI/CD Simulation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        run: npm install --prefix backend

      - name: Validate backend syntax
        run: node --check backend/server.js

  deploy_simulation:
    name: Deploy Simulation
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Simulate deploy to server
        run: |
          echo "Deploying SchoolHub to simulated server..."
          echo "Build passed, deployment step completed."
